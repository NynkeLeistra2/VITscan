<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Als alles klopt: Boost je werkgeluk</title>
<style>
  :root {
    --violet: #6b4a7a;
    --violet-donker: #55394f;
    --salie: #a9b797;
    --amber: #e3b268;
    --ecru: #faf5f1;
    --oudroze: #c39d98;
    --tekst: #2b2430;
    --lijn: #cdbfc4;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ecru);
    color: var(--tekst);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    line-height: 1.5;
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
  }

  header img {
    height: 56px;
    width: auto;
  }

  h1 {
    color: var(--violet);
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: 0.01em;
    margin: 1rem 0 0.5rem;
  }

  .intro {
    max-width: 620px;
    margin: 0 auto 2.5rem;
    padding: 0 1.25rem;
    text-align: center;
    color: #5a4d53;
  }

  .melding {
    max-width: 620px;
    margin: 0 auto 2rem;
    padding: 0.75rem 1.25rem;
    text-align: center;
    background: #fff8e6;
    border: 1px solid #d9a441;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;
  }

  .melding.zichtbaar { display: block; }

  /* Stap-indicator */
  .stap-indicator {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 2rem;
  }

  .stap-bolletje {
    width: 0.6rem;
    height: 0.6rem;
    border-radius: 50%;
    background: var(--lijn);
  }

  .stap-bolletje.actief { background: var(--amber); }

  section.thema {
    max-width: 1000px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
    display: none;
  }

  section.thema.actief { display: block; }

  h2.thema-titel {
    text-align: center;
    color: var(--violet);
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    margin-bottom: 1.75rem;
  }

  .legenda {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: #5a4d53;
  }
  .legenda span { display: inline-flex; align-items: center; gap: 0.4rem; }
  .bolletje { width: 0.8rem; height: 0.8rem; border-radius: 50%; display: inline-block; }
  .bolletje.geel { background: #fff8e6; border: 2px solid #d9a441; }
  .bolletje.violet { background: #efe8f1; border: 2px solid var(--violet); }

  /* Desktop mindmap */
  .mindmap {
    position: relative;
    width: 100%;
    max-width: 820px;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
  }

  .cirkel-midden {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: var(--oudroze);
    border: 3px solid var(--violet);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 800;
    color: var(--violet-donker);
    padding: 0.5rem;
    font-size: 0.95rem;
    white-space: pre-line;
  }

  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 168px;
    text-align: center;
  }

  .node .label {
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--violet-donker);
    margin-bottom: 0.35rem;
  }

  .vakjes {
    display: flex;
    gap: 0.4rem;
    justify-content: center;
  }

  .vakjes input {
    width: 3.2rem;
    height: 3.2rem;
    text-align: center;
    font-weight: 700;
    font-size: 1.2rem;
    border-radius: 8px;
    font-family: inherit;
    padding: 0;
    /* Voorkomt dat de op-/neer-pijltjes van een number-input de cijfers
       (bv. "10", "7.3") laten inklemmen op zo'n klein vakje. */
    -moz-appearance: textfield;
    appearance: textfield;
  }

  .vakjes input::-webkit-outer-spin-button,
  .vakjes input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input.huidig { border: 2px solid #d9a441; background: #fff8e6; color: #6b5008; }
  input.gewenst { border: 2px solid var(--violet); background: #efe8f1; color: var(--violet-donker); }

  .wonder-blok {
    max-width: 640px;
    margin: 2.5rem auto 0;
  }

  .wonder-item {
    background: #fff;
    border: 1px solid var(--lijn);
    border-radius: 10px;
    padding: 1.1rem 1.2rem;
    margin-bottom: 1rem;
  }

  .wonder-item .kop {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .wonder-item .kop-label {
    font-weight: 800;
    color: var(--violet-donker);
  }

  .wonder-item p.vraag {
    margin: 0.6rem 0 0.4rem;
    font-size: 0.88rem;
    color: #7a6b71;
  }

  .wonder-item textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid var(--lijn);
    border-radius: 8px;
    padding: 0.65rem;
    font-family: inherit;
    font-size: 0.95rem;
    resize: vertical;
  }

  /* Generieke tekstvelden (stap 2/3/bonus) */
  .stap-inhoud {
    max-width: 640px;
    margin: 0 auto;
  }

  .stap-inhoud > p {
    margin-bottom: 1rem;
  }

  .veld-blok {
    background: #fff;
    border: 1px solid var(--lijn);
    border-radius: 10px;
    padding: 1.1rem 1.2rem;
    margin-bottom: 1rem;
  }

  .veld-blok label {
    display: block;
    font-weight: 800;
    color: var(--violet-donker);
    margin-bottom: 0.4rem;
  }

  .veld-blok p.veld-hulp {
    margin: 0 0 0.5rem;
    font-size: 0.85rem;
    color: #7a6b71;
  }

  .veld-blok input[type="text"],
  .veld-blok textarea {
    width: 100%;
    border: 1px solid var(--lijn);
    border-radius: 8px;
    padding: 0.65rem;
    font-family: inherit;
    font-size: 0.95rem;
  }

  .veld-blok textarea { min-height: 80px; resize: vertical; }

  .audio-blok {
    max-width: 640px;
    margin: 0 auto 1.5rem;
  }

  .quote {
    max-width: 640px;
    margin: 1.5rem auto;
    text-align: center;
    font-style: italic;
    color: var(--violet-donker);
    font-size: 1.05rem;
  }

  .invloed-afbeelding {
    display: block;
    max-width: 640px;
    width: 100%;
    height: auto;
    margin: 0 auto 1.5rem;
    border-radius: 10px;
  }

  .actie-blok {
    background: #fff;
    border: 1px solid var(--lijn);
    border-radius: 10px;
    padding: 1.1rem 1.2rem;
    margin-bottom: 1.2rem;
  }
  .actie-blok .gevoelsdoel-label {
    font-weight: 800;
    color: var(--violet-donker);
    margin: 0 0 0.8rem;
  }
  .toevoeg-knop {
    display: block;
    width: 100%;
    background: transparent;
    border: 2px dashed var(--violet);
    color: var(--violet);
    border-radius: 10px;
    padding: 0.8rem;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    margin-bottom: 1.5rem;
  }
  .toevoeg-knop:hover { background: #efe8f1; }
  .subdoel-titel {
    font-weight: 700;
    color: var(--violet);
    margin: 1rem 0 0.5rem;
    font-size: 0.9rem;
  }
  .subdoel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
  }
  @media (max-width: 560px) {
    .subdoel-grid { grid-template-columns: 1fr; }
  }
  .subdoel-grid .veld-mini { grid-column: 1 / -1; }
  .veld-mini label,
  .subdoel-grid label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    color: #5a4d53;
    margin-bottom: 0.25rem;
  }
  .veld-mini input[type="text"],
  .veld-mini textarea,
  .subdoel-grid input[type="text"] {
    width: 100%;
    border: 1px solid var(--lijn);
    border-radius: 6px;
    padding: 0.5rem;
    font-family: inherit;
    font-size: 0.9rem;
  }

  .evaluatie-cta {
    max-width: 640px;
    margin: 2rem auto;
    text-align: center;
    background: #efe8f1;
    border: 1px solid var(--violet);
    border-radius: 10px;
    padding: 1.4rem;
  }
  .evaluatie-cta p { margin: 0 0 0.9rem; color: var(--violet-donker); }
  .evaluatie-cta a.knop {
    display: inline-block;
    background: var(--violet);
    color: #fff;
    text-decoration: none;
    padding: 0.75rem 1.6rem;
    border-radius: 8px;
    font-weight: 700;
  }
  .evaluatie-cta a.knop:hover { background: var(--violet-donker); }

  .talent-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    max-width: 720px;
    margin: 0 auto 1.5rem;
  }
  @media (max-width: 560px) {
    .talent-grid { grid-template-columns: 1fr; }
  }
  .talent-kaart {
    background: #fff;
    border: 1px solid var(--lijn);
    border-radius: 10px;
    padding: 1rem;
  }
  .talent-naam {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 800;
    color: var(--violet-donker);
    margin-bottom: 0.6rem;
  }
  .talent-bol {
    width: 0.9rem;
    height: 0.9rem;
    border-radius: 50%;
    display: inline-block;
  }
  .talent-kaart textarea {
    width: 100%;
    min-height: 60px;
    border: 1px solid var(--lijn);
    border-radius: 6px;
    padding: 0.5rem;
    font-family: inherit;
    font-size: 0.88rem;
    resize: vertical;
  }
  .talent-kaart select {
    margin-top: 0.5rem;
    width: 100%;
    border: 1px solid var(--lijn);
    border-radius: 6px;
    padding: 0.4rem;
    font-family: inherit;
    font-size: 0.85rem;
  }

  /* Mobiel: kaartweergave i.p.v. cirkel */
  .kaarten { display: none; }

  @media (max-width: 760px) {
    .mindmap { display: none; }
    .kaarten {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .kaart {
      background: #fff;
      border: 1px solid var(--lijn);
      border-radius: 10px;
      padding: 1rem;
    }
    .kaart .label { font-weight: 800; color: var(--violet-donker); margin-bottom: 0.5rem; }
    .kaart .vakjes { justify-content: flex-start; }
  }

  /* Stap-navigatie (vorige/volgende opdracht) */
  .stap-navigatie {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 1rem;
    display: flex;
    justify-content: space-between;
    gap: 1rem;
  }

  .stap-navigatie button {
    border: none;
    border-radius: 8px;
    padding: 0.8rem 1.5rem;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }

  .stap-navigatie .volgende {
    background: var(--violet);
    color: #fff;
    margin-left: auto;
  }
  .stap-navigatie .volgende:hover { background: var(--violet-donker); }

  .stap-navigatie .vorige {
    background: transparent;
    color: var(--violet);
    border: 2px solid var(--violet);
  }
  .stap-navigatie .vorige:hover { background: #efe8f1; }

  .stap-navigatie button[hidden] { display: none; }

  .acties {
    text-align: center;
    margin: 2.5rem 0 3.5rem;
  }

  button.print-knop {
    background: var(--amber);
    color: var(--violet-donker);
    border: none;
    padding: 0.85rem 1.9rem;
    border-radius: 8px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
  }

  button.print-knop:hover { filter: brightness(0.94); }

  .acties p {
    margin-top: 0.6rem;
    font-size: 0.82rem;
    color: #8a7b81;
  }

  footer {
    text-align: center;
    padding: 2rem 1rem 3rem;
    color: var(--oudroze);
    font-size: 0.85rem;
    border-top: 1px solid var(--lijn);
  }
  footer a { color: var(--oudroze); }

  @media print {
    .acties, .melding, .stap-navigatie, .stap-indicator { display: none !important; }
    .mindmap { display: none !important; }
    .kaarten { display: flex !important; flex-direction: column; gap: 0.75rem; }
    section.thema { display: block !important; page-break-inside: avoid; margin-bottom: 1.5rem; }
    body { background: #fff; }
  }
</style>
</head>
<body>

<header>
  <img src="/nynke-logo-pdf.png" alt="Nynke Leistra Coaching en Advies" />
  <h1 id="stap-titel">Als alles klopt</h1>
</header>

<div class="stap-indicator" id="stap-indicator"></div>

<div id="secties"></div>

<div class="stap-navigatie">
  <button class="vorige" type="button" id="vorige-btn">Naar vorige opdracht</button>
  <button class="volgende" type="button" id="volgende-btn">Naar volgende opdracht</button>
</div>

<div class="acties">
  <button class="print-knop" type="button" id="print-btn">Opslaan / printen als PDF</button>
  <p>Alles wat je hier invult blijft alleen in je eigen browser. Er wordt niets naar een server gestuurd.</p>
</div>

<footer>
  Boost je werkgeluk, Nynke Leistra Coaching en Advies © 2026<br />
  <a href="https://www.nynkeleistra.nl">www.nynkeleistra.nl</a>
</footer>

<script>
(function () {
  "use strict";

  // Vaste structuur uit het werkboek "Als alles klopt". Losstaand van de
  // scan-app (bewust: dit bestand is self-contained), dus bij een
  // toekomstige wijziging van de 19 thema's in vit-scan-stellingen.json
  // moet deze lijst er handmatig op aangepast worden.
  var THEMAS = [
    {
      deelId: "werkenergie",
      titel: "WERKENERGIE",
      cirkelLabel: "WERK",
      items: [
        { id: "plezier", label: "Plezier" },
        { id: "voldoening", label: "Voldoening" },
        { id: "competentie", label: "Competenties" },
        { id: "uitdaging", label: "Uitdaging" },
        { id: "autonomie", label: "Autonomie" },
        { id: "waardering", label: "Waardering" },
        { id: "zingeving", label: "Zingeving" },
        { id: "vertrouwen", label: "Vertrouwen" },
        { id: "verbinding", label: "Verbinding" },
        { id: "duidelijkheid", label: "Duidelijkheid" },
        { id: "fysieke_werkomgeving", label: "Fysieke werkomgeving" }
      ]
    },
    {
      deelId: "persoonlijk_welzijn",
      titel: "PERSOONLIJK WELZIJN",
      cirkelLabel: "PERSOONLIJK\nWELZIJN",
      items: [
        { id: "balans", label: "Balans" },
        { id: "fysieke_gezondheid", label: "Fysieke gezondheid" },
        { id: "mentale_gezondheid", label: "Mentale gezondheid" },
        { id: "ontspanning", label: "Ontspanning / vrije tijd" },
        { id: "financien", label: "Financiën" },
        { id: "persoonlijke_ontwikkeling", label: "Persoonlijke ontwikkeling" },
        { id: "familie_relaties", label: "Familie en relaties" },
        { id: "huis_leefomgeving", label: "Huis en leefomgeving" }
      ]
    }
  ];

  var HANDOFF_SLEUTEL = "boost-opdrachten-scores";
  var OPSLAG_SLEUTEL = "boost-opdrachten-antwoorden";
  var STAP_SLEUTEL = "boost-opdrachten-stap";

  // --- Scan-scores ophalen (eenmalige overdracht, meteen weer wissen) ---
  var scanScores = {};
  try {
    var ruw = window.localStorage.getItem(HANDOFF_SLEUTEL);
    if (ruw) {
      scanScores = JSON.parse(ruw) || {};
    }
    window.localStorage.removeItem(HANDOFF_SLEUTEL);
  } catch (e) {
    scanScores = {};
  }
  var geenScanScores = Object.keys(scanScores).length === 0;

  // --- Eerder ingevulde antwoorden op deze pagina (los van de scan-overdracht) ---
  var opgeslagenAntwoorden = {};
  try {
    var ruwOpgeslagen = window.localStorage.getItem(OPSLAG_SLEUTEL);
    if (ruwOpgeslagen) opgeslagenAntwoorden = JSON.parse(ruwOpgeslagen) || {};
  } catch (e) {
    opgeslagenAntwoorden = {};
  }

  function opslaan() {
    try {
      window.localStorage.setItem(OPSLAG_SLEUTEL, JSON.stringify(opgeslagenAntwoorden));
    } catch (e) {
      /* geen opslag beschikbaar (bv. privénavigatie), niet fataal */
    }
  }

  function veldWaarde(id, veld, standaard) {
    var opgeslagen = opgeslagenAntwoorden[id] && opgeslagenAntwoorden[id][veld];
    if (opgeslagen !== undefined && opgeslagen !== null && opgeslagen !== "") return opgeslagen;
    return standaard === undefined ? "" : standaard;
  }

  function bijwerken(id, veld, waarde) {
    if (!opgeslagenAntwoorden[id]) opgeslagenAntwoorden[id] = {};
    opgeslagenAntwoorden[id][veld] = waarde;
    opslaan();
  }

  // --- Losse velden voor stap 2/3/bonus (geen geel/violet-cijfers, dus
  // los van opgeslagenAntwoorden hierboven, eigen localStorage-sleutel). ---
  var VELDEN_SLEUTEL = "boost-opdrachten-velden";
  var velden = {};
  try {
    var ruwVelden = window.localStorage.getItem(VELDEN_SLEUTEL);
    if (ruwVelden) velden = JSON.parse(ruwVelden) || {};
  } catch (e) {
    velden = {};
  }

  function veldenOpslaan() {
    try {
      window.localStorage.setItem(VELDEN_SLEUTEL, JSON.stringify(velden));
    } catch (e) {
      /* niet fataal */
    }
  }

  function veldLezen(id, standaard) {
    var waarde = velden[id];
    return waarde !== undefined && waarde !== null ? waarde : standaard === undefined ? "" : standaard;
  }

  function veldSchrijven(id, waarde) {
    velden[id] = waarde;
    veldenOpslaan();
  }

  function maakVeldBlok(id, labelTekst, hulpTekst, meerregelig) {
    var wrap = document.createElement("div");
    wrap.className = "veld-blok";

    var label = document.createElement("label");
    label.textContent = labelTekst;
    label.setAttribute("for", id);
    wrap.appendChild(label);

    if (hulpTekst) {
      var hulp = document.createElement("p");
      hulp.className = "veld-hulp";
      hulp.textContent = hulpTekst;
      wrap.appendChild(hulp);
    }

    var invoer = document.createElement(meerregelig === false ? "input" : "textarea");
    if (meerregelig === false) invoer.type = "text";
    invoer.id = id;
    invoer.value = veldLezen(id, "");
    invoer.addEventListener("input", function () {
      veldSchrijven(id, invoer.value);
    });
    wrap.appendChild(invoer);

    return wrap;
  }

  function maakMiniVeld(id, labelTekst, meerregelig) {
    var wrap = document.createElement("div");
    if (meerregelig) wrap.className = "veld-mini";
    var label = document.createElement("label");
    label.textContent = labelTekst;
    label.setAttribute("for", id);
    wrap.appendChild(label);
    var invoer = document.createElement(meerregelig ? "textarea" : "input");
    if (!meerregelig) invoer.type = "text";
    invoer.id = id;
    invoer.value = veldLezen(id, "");
    invoer.addEventListener("input", function () {
      veldSchrijven(id, invoer.value);
    });
    wrap.appendChild(invoer);
    return wrap;
  }

  // --- Cijfer-vakjes (geel/violet) ---
  function maakVakjes(item) {
    var wrap = document.createElement("div");
    wrap.className = "vakjes";

    var huidig = document.createElement("input");
    huidig.type = "number";
    huidig.min = "1";
    huidig.max = "10";
    huidig.step = "0.1";
    huidig.className = "huidig";
    huidig.setAttribute("aria-label", item.label + ": huidig cijfer");
    var scanWaarde = scanScores[item.id];
    huidig.value = veldWaarde(item.id, "huidig", scanWaarde !== undefined ? scanWaarde : "");
    huidig.addEventListener("input", function () {
      bijwerken(item.id, "huidig", huidig.value);
    });

    var gewenst = document.createElement("input");
    gewenst.type = "number";
    gewenst.min = "1";
    gewenst.max = "10";
    gewenst.step = "0.1";
    gewenst.className = "gewenst";
    gewenst.setAttribute("aria-label", item.label + ": gewenst cijfer");
    gewenst.value = veldWaarde(item.id, "gewenst", "");
    gewenst.addEventListener("input", function () {
      bijwerken(item.id, "gewenst", gewenst.value);
    });

    wrap.appendChild(huidig);
    wrap.appendChild(gewenst);
    return wrap;
  }

  // --- Desktop mindmap: items gelijkmatig rond een cirkel ---
  function bouwMindmap(thema) {
    var mindmap = document.createElement("div");
    mindmap.className = "mindmap";

    var midden = document.createElement("div");
    midden.className = "cirkel-midden";
    midden.textContent = thema.cirkelLabel;
    mindmap.appendChild(midden);

    var n = thema.items.length;
    var radius = 33; // % van de container, dichtbij de middencirkel
    thema.items.forEach(function (item, i) {
      var hoek = (i / n) * 2 * Math.PI - Math.PI / 2; // start bovenaan
      var x = 50 + radius * Math.cos(hoek);
      var y = 50 + radius * Math.sin(hoek);

      var node = document.createElement("div");
      node.className = "node";
      node.style.left = x + "%";
      node.style.top = y + "%";

      var label = document.createElement("div");
      label.className = "label";
      label.textContent = item.label;
      node.appendChild(label);
      node.appendChild(maakVakjes(item));

      mindmap.appendChild(node);
    });

    return mindmap;
  }

  // --- Mobiele kaartweergave ---
  function bouwKaarten(thema) {
    var lijst = document.createElement("div");
    lijst.className = "kaarten";
    thema.items.forEach(function (item) {
      var kaart = document.createElement("div");
      kaart.className = "kaart";
      var label = document.createElement("div");
      label.className = "label";
      label.textContent = item.label;
      kaart.appendChild(label);
      kaart.appendChild(maakVakjes(item));
      lijst.appendChild(kaart);
    });
    return lijst;
  }

  // --- Wonder-reflectie tekstvelden ---
  function bouwWonderBlok(thema) {
    var blok = document.createElement("div");
    blok.className = "wonder-blok";
    thema.items.forEach(function (item) {
      var wrap = document.createElement("div");
      wrap.className = "wonder-item";

      var kop = document.createElement("div");
      kop.className = "kop";
      var koplabel = document.createElement("span");
      koplabel.className = "kop-label";
      koplabel.textContent = item.label;
      kop.appendChild(koplabel);
      wrap.appendChild(kop);

      var vraag = document.createElement("p");
      vraag.className = "vraag";
      vraag.textContent = "Als dat wonder is gebeurd: wat is er precies veranderd, en hoe voel jij je?";
      wrap.appendChild(vraag);

      var textarea = document.createElement("textarea");
      textarea.value = veldWaarde(item.id, "tekst", "");
      textarea.addEventListener("input", function () {
        bijwerken(item.id, "tekst", textarea.value);
      });
      wrap.appendChild(textarea);

      blok.appendChild(wrap);
    });
    return blok;
  }

  // --- Evaluatie-oproep (na stap 3 en na de bonus) ---
  function maakEvaluatieCta() {
    var cta = document.createElement("div");
    cta.className = "evaluatie-cta";
    var tekst = document.createElement("p");
    tekst.textContent = "Bijna klaar? Ik ben benieuwd wat dit programma je heeft opgeleverd.";
    var link = document.createElement("a");
    link.className = "knop";
    link.href = "/evaluatie.html";
    link.textContent = "Vul de evaluatie in";
    cta.appendChild(tekst);
    cta.appendChild(link);
    return cta;
  }

  // --- Stap 2: (Gevoels)doelen stellen ---
  function bouwStap2() {
    var sectie = document.createElement("section");
    sectie.className = "thema";

    var titel = document.createElement("h2");
    titel.className = "thema-titel";
    titel.textContent = "(GEVOELS)DOELEN STELLEN";
    sectie.appendChild(titel);

    var inhoud = document.createElement("div");

    var intro = document.createElement("p");
    intro.textContent =
      "In deze module doen we iets wat je misschien niet gewend bent: een ademhalings- en visualisatieoefening. " +
      "Doelen stellen werkt krachtiger als je eerst weet hoe je je wilt voelen. Zoek een rustige plek op waar je niet gestoord wordt, en houd pen en papier (of dit scherm) bij de hand.";
    inhoud.appendChild(intro);

    var audioBlok = document.createElement("div");
    audioBlok.className = "audio-blok";
    audioBlok.innerHTML =
      '<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" ' +
      'src="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fnynkeleistra-nl%2Foefening-regie-op-werkgeluk%2Fs-kmXagwUbDf6&color=%236b4a7a&auto_play=false&show_user=true"></iframe>' +
      '<p style="text-align:center;font-size:0.85rem;margin-top:0.4rem;">' +
      'Speler laadt niet? <a href="https://on.soundcloud.com/wOGs5UcPTRmdUuS0M6" target="_blank" rel="noopener">' +
      "Beluister de oefening rechtstreeks op SoundCloud</a></p>";
    inhoud.appendChild(audioBlok);

    var quote = document.createElement("p");
    quote.className = "quote";
    quote.textContent = "“Als jij weet hoe jij je wilt voelen, dan pas kun je praktische doelen eraan koppelen.”";
    inhoud.appendChild(quote);

    inhoud.appendChild(
      maakVeldBlok(
        "s2-reflectie",
        "Schrijf hieronder alles op wat er in je opkomt naar aanleiding van de oefening.",
        "Hoe voelde jij je toen je wakker werd? Onderweg naar je werk? Tijdens het werk? Weer thuis? " +
          "Kwam er niets duidelijks naar boven? Stel jezelf dan de vraag: stel morgen is alles anders. " +
          "Waaraan merk je als eerste dat er iets veranderd is? Wat merken anderen aan jou? En hoe voel jij je?"
      )
    );

    var gevoelsdoelenTitel = document.createElement("p");
    gevoelsdoelenTitel.innerHTML =
      "<strong>Noteer hieronder minimaal 2 gevoelsdoelen.</strong> Het kan helpen om eerst je verlangens te omschrijven " +
      'en die om te zetten in een gevoelsdoel. Bijvoorbeeld: verlang je naar meer rust, dan kan je doel zijn "Ik heb rust in mijn hoofd en lijf."';
    inhoud.appendChild(gevoelsdoelenTitel);

    for (var g = 1; g <= 4; g++) {
      inhoud.appendChild(maakVeldBlok("s2-gevoelsdoel-" + g, "Gevoelsdoel " + g, null, false));
    }

    inhoud.appendChild(
      maakVeldBlok(
        "s2-werk-factoren",
        "Welke WERK-factoren zorgen er nu voor dat jij je nog niet zo voelt als je zou willen?",
        "Bijvoorbeeld: het contact met je leidinggevende verloopt niet goed, of je hebt geen plezier meer in je werk."
      )
    );

    inhoud.appendChild(
      maakVeldBlok(
        "s2-persoonlijke-factoren",
        "Welke PERSOONLIJKE factoren zorgen er nu voor dat jij je nog niet zo voelt als je zou willen?",
        "Bijvoorbeeld: je voelt angst om een stap te zetten, of je neemt niet genoeg ruimte voor jezelf."
      )
    );

    sectie.appendChild(inhoud);
    return sectie;
  }

  // --- Stap 3: Tijd voor actie ---
  function bouwStap3() {
    var sectie = document.createElement("section");
    sectie.className = "thema";

    var titel = document.createElement("h2");
    titel.className = "thema-titel";
    titel.textContent = "TIJD VOOR ACTIE";
    sectie.appendChild(titel);

    var inhoud = document.createElement("div");
    inhoud.className = "stap-inhoud";

    var intro = document.createElement("p");
    intro.textContent =
      "Nu je helder hebt hoe jij je wilt voelen en welke factoren je daarbij in de weg staan, is het tijd om dit om te zetten in concrete acties. " +
      "Richt je energie op zaken waar je invloed op hebt, en laat los wat buiten jouw macht ligt. Factoren waar je geen directe invloed op hebt vragen ook om een keuze: soms is dat accepteren en loslaten, soms een indirecte actie (niet de situatie veranderen, maar wel hoe jij ermee omgaat).";
    inhoud.appendChild(intro);

    var invloedAfbeelding = document.createElement("img");
    invloedAfbeelding.className = "invloed-afbeelding";
    invloedAfbeelding.src = "/cirkel-van-invloed.png";
    invloedAfbeelding.alt = "Cirkel van invloed: waar je wel en geen invloed op hebt";
    inhoud.appendChild(invloedAfbeelding);
    var invloedBron = document.createElement("p");
    invloedBron.className = "veld-hulp";
    invloedBron.style.textAlign = "center";
    invloedBron.textContent = "Bron: Cirkel van Invloed, S. Covey.";
    inhoud.appendChild(invloedBron);

    inhoud.appendChild(
      maakVeldBlok(
        "s3-wel-invloed",
        "Pak de opdrachten van de eerdere stappen er nog eens bij: waar heb jij WEL invloed op?",
        null
      )
    );

    var subdoelenTitel = document.createElement("p");
    subdoelenTitel.innerHTML =
      "<strong>Welke eerste (kleine) stappen kun jij nu zetten om jouw gevoelsdoel te bereiken?</strong> Kies per gevoelsdoel een of twee subdoelen: een concreet deelstapje, een actie, wanneer je die zet, en wie je erbij kan helpen.";
    inhoud.appendChild(subdoelenTitel);

    var blokkenContainer = document.createElement("div");
    inhoud.appendChild(blokkenContainer);
    var vasteBlokkenContainer = document.createElement("div");
    var extraBlokkenContainer = document.createElement("div");
    blokkenContainer.appendChild(vasteBlokkenContainer);
    blokkenContainer.appendChild(extraBlokkenContainer);

    function maakActieBlok(idSuffix, gevoelsdoelTekst) {
      var blok = document.createElement("div");
      blok.className = "actie-blok";

      if (gevoelsdoelTekst) {
        var label = document.createElement("p");
        label.className = "gevoelsdoel-label";
        label.textContent = "Gevoelsdoel: " + gevoelsdoelTekst;
        blok.appendChild(label);
      } else {
        blok.appendChild(maakMiniVeld("s3-g" + idSuffix + "-gevoelsdoel", "Gevoelsdoel", false));
      }

      [1, 2].forEach(function (subdoelNr) {
        var subTitel = document.createElement("p");
        subTitel.className = "subdoel-titel";
        subTitel.textContent = "Subdoel " + subdoelNr;
        blok.appendChild(subTitel);

        var prefix = "s3-g" + idSuffix + "-subdoel" + subdoelNr;
        var grid = document.createElement("div");
        grid.className = "subdoel-grid";
        grid.appendChild(maakMiniVeld(prefix, "Subdoel", false));
        var actieVeld = maakMiniVeld(prefix + "-actie", "Hoe ga ik dit doen (acties)?", true);
        actieVeld.className = "veld-mini";
        grid.appendChild(actieVeld);
        grid.appendChild(maakMiniVeld(prefix + "-wanneer", "Wanneer", false));
        grid.appendChild(maakMiniVeld(prefix + "-hulp", "Wie kan mij hierbij helpen?", false));
        blok.appendChild(grid);
      });

      return blok;
    }

    // Extra, zelf toe te voegen gevoelsdoelen (los van stap 2), met een
    // invulbaar Gevoelsdoel-veld. Aantal wordt onthouden zodat ze bij
    // terugkomst blijven staan.
    var extraAantal = parseInt(veldLezen("s3-extra-aantal", "0"), 10) || 0;
    var standaardExtraToegevoegd = false;

    function extraBlokIsLeeg(idSuffix) {
      var ids = ["gevoelsdoel"];
      [1, 2].forEach(function (subdoelNr) {
        var prefix = "subdoel" + subdoelNr;
        ids.push(prefix, prefix + "-actie", prefix + "-wanneer", prefix + "-hulp");
      });
      return ids.every(function (suffix) {
        return !veldLezen("s3-g" + idSuffix + "-" + suffix, "").trim();
      });
    }

    // Gevoelsdoelen 1 t/m 4 uit stap 2 (indien ingevuld) krijgen automatisch
    // een actie-blok, met de tekst als vaste label. Opnieuw opgebouwd bij elk
    // bezoek aan deze stap (i.p.v. alleen bij het laden van de pagina), zodat
    // een gevoelsdoel dat je zonder herladen net op stap 2 hebt ingevuld hier
    // ook meteen verschijnt. Elk blok gebruikt stabiele veld-id's per
    // idSuffix, dus opnieuw opbouwen verliest geen al ingevulde subdoelen.
    function ververVasteGevoelsdoelen() {
      vasteBlokkenContainer.innerHTML = "";
      var vasteGevoelsdoelen = [];
      for (var i = 1; i <= 4; i++) {
        var waarde = veldLezen("s2-gevoelsdoel-" + i, "");
        if (waarde.trim()) vasteGevoelsdoelen.push({ idSuffix: i, tekst: waarde });
      }
      vasteGevoelsdoelen.forEach(function (gevoelsdoel) {
        vasteBlokkenContainer.appendChild(maakActieBlok(gevoelsdoel.idSuffix, gevoelsdoel.tekst));
      });

      // Het automatisch toegevoegde lege startblok (zie hieronder) is alleen
      // nodig zolang er nog geen enkel gevoelsdoel is. Verschijnt er alsnog
      // een vast gevoelsdoel uit stap 2 en is dat startblok nog leeg, dan
      // ruimen we het op i.p.v. het naast de echte blokken te laten staan.
      if (standaardExtraToegevoegd && vasteGevoelsdoelen.length > 0 && extraBlokIsLeeg("extra1")) {
        var startBlok = extraBlokkenContainer.firstElementChild;
        if (startBlok) extraBlokkenContainer.removeChild(startBlok);
        standaardExtraToegevoegd = false;
        extraAantal = 0;
        veldSchrijven("s3-extra-aantal", "0");
      }

      return vasteGevoelsdoelen.length;
    }
    var vasteAantal = ververVasteGevoelsdoelen();

    if (vasteAantal === 0 && extraAantal === 0) {
      extraAantal = 1;
      standaardExtraToegevoegd = true;
    }
    for (var e = 1; e <= extraAantal; e++) {
      extraBlokkenContainer.appendChild(maakActieBlok("extra" + e, null));
    }

    var toevoegKnop = document.createElement("button");
    toevoegKnop.type = "button";
    toevoegKnop.className = "toevoeg-knop";
    toevoegKnop.textContent = "+ Nog een gevoelsdoel toevoegen";
    toevoegKnop.addEventListener("click", function () {
      extraAantal += 1;
      veldSchrijven("s3-extra-aantal", String(extraAantal));
      var nieuwBlok = maakActieBlok("extra" + extraAantal, null);
      extraBlokkenContainer.appendChild(nieuwBlok);
      var eersteVeld = nieuwBlok.querySelector("input, textarea");
      if (eersteVeld) eersteVeld.focus();
      nieuwBlok.scrollIntoView({ behavior: "smooth", block: "center" });
    });
    inhoud.appendChild(toevoegKnop);

    inhoud.appendChild(
      maakVeldBlok(
        "s3-tot-slot",
        "Hoe ga jij ervoor zorgen dat je hiermee verder gaat?",
        "Welke afspraken maak je met jezelf, zodat je in beweging blijft?"
      )
    );

    sectie.appendChild(inhoud);
    sectie.ververVasteGevoelsdoelen = ververVasteGevoelsdoelen;
    return sectie;
  }

  // --- Bonus: de kracht van jouw talent (Intuïst®-methode; namen/kleuren
  // als eenvoudige tekst-badges, bewust geen Intuïst-artwork nagemaakt). ---
  var TALENTTYPES = [
    { id: "verbinder", label: "Verbinder", kleur: "#d97757" },
    { id: "rebel", label: "Rebel", kleur: "#2b2430" },
    { id: "maker", label: "Maker", kleur: "#b08d1f" },
    { id: "leider", label: "Leider", kleur: "#3f6b73" },
    { id: "oplosser", label: "Oplosser", kleur: "#9b8bb4" },
    { id: "optimist", label: "Optimist", kleur: "#e0836a" },
    { id: "doener", label: "Doener", kleur: "#c98a3a" },
    { id: "wijze", label: "Wijze", kleur: "#5b3a6e" },
    { id: "levensgenieter", label: "Levensgenieter", kleur: "#e0b23c" },
    { id: "held", label: "Held", kleur: "#c0524a" },
    { id: "zorggever", label: "Zorggever", kleur: "#7a2e35" },
    { id: "onderzoeker", label: "Onderzoeker", kleur: "#7ba7b0" }
  ];

  function bouwBonus() {
    var sectie = document.createElement("section");
    sectie.className = "thema";

    var titel = document.createElement("h2");
    titel.className = "thema-titel";
    titel.textContent = "BONUS: DE KRACHT VAN JOUW TALENT";
    sectie.appendChild(titel);

    var inhoud = document.createElement("div");
    inhoud.className = "stap-inhoud";

    var intro = document.createElement("p");
    intro.textContent =
      "In haar werk als coach gebruikt Nynke de intuïst®-methode: 12 talenttypes die helpen om verlangens en uitdagingen simpel en herkenbaar te maken. " +
      "Noteer bij elk talenttype wat het bij jou oproept, en geef aan of het voor jou een kracht, een verlangen of een uitdaging is.";
    inhoud.appendChild(intro);

    var grid = document.createElement("div");
    grid.className = "talent-grid";
    TALENTTYPES.forEach(function (type) {
      var kaart = document.createElement("div");
      kaart.className = "talent-kaart";

      var naam = document.createElement("div");
      naam.className = "talent-naam";
      var bol = document.createElement("span");
      bol.className = "talent-bol";
      bol.style.background = type.kleur;
      naam.appendChild(bol);
      naam.appendChild(document.createTextNode(type.label));
      kaart.appendChild(naam);

      var textarea = document.createElement("textarea");
      textarea.id = "bonus-" + type.id + "-tekst";
      textarea.placeholder = "Talent, kracht en eventuele valkuil...";
      textarea.value = veldLezen("bonus-" + type.id + "-tekst", "");
      textarea.addEventListener("input", function () {
        veldSchrijven("bonus-" + type.id + "-tekst", textarea.value);
      });
      kaart.appendChild(textarea);

      var select = document.createElement("select");
      select.id = "bonus-" + type.id + "-tag";
      ["", "Kracht", "Verlangen", "Uitdaging"].forEach(function (optieTekst) {
        var optie = document.createElement("option");
        optie.value = optieTekst;
        optie.textContent = optieTekst || "Kracht, verlangen of uitdaging?";
        select.appendChild(optie);
      });
      select.value = veldLezen("bonus-" + type.id + "-tag", "");
      select.addEventListener("change", function () {
        veldSchrijven("bonus-" + type.id + "-tag", select.value);
      });
      kaart.appendChild(select);

      grid.appendChild(kaart);
    });
    inhoud.appendChild(grid);

    inhoud.appendChild(
      maakVeldBlok("bonus-verlangen", "Verlangen: welk talenttype staat symbool voor jouw grootste verlangen, en waarom?")
    );
    inhoud.appendChild(
      maakVeldBlok("bonus-uitdaging", "Uitdaging: wat is jouw grootste uitdaging, en welk talenttype hoort daarbij?")
    );
    inhoud.appendChild(
      maakVeldBlok("bonus-kracht", "Kracht: welke talenttypes zijn nu al jouw kracht en helpen je verder?")
    );
    inhoud.appendChild(
      maakVeldBlok(
        "bonus-synthese",
        "Beschrijf hoe deze drie talenttypes (kracht, verlangen, uitdaging) jou samen ondersteunen op weg naar meer werk- en levensgeluk."
      )
    );
    inhoud.appendChild(
      maakVeldBlok("bonus-reflectie", "En, hoe was dat om te doen? Hielp het, of vond je het lastig?")
    );

    inhoud.appendChild(maakEvaluatieCta());

    sectie.appendChild(inhoud);
    return sectie;
  }

  // --- Alles opbouwen ---
  var container = document.getElementById("secties");
  var indicator = document.getElementById("stap-indicator");
  var secties = [];

  THEMAS.forEach(function (thema, index) {
    var sectie = document.createElement("section");
    sectie.className = "thema";
    sectie.dataset.stap = String(index);

    var titel = document.createElement("h2");
    titel.className = "thema-titel";
    titel.textContent = thema.titel;
    sectie.appendChild(titel);

    var intro = document.createElement("div");
    intro.className = "intro";
    intro.innerHTML =
      "<p>Stel: er gebeurt vannacht een wonder. Je voelt volop werkgeluk, krijgt energie van je werk en leven, en hebt weer echt zin om te beginnen.</p>" +
      "<p>In het <strong>gele</strong> vakje staat je huidige score uit de scan. Kijk ernaar: ben je tevreden, of mag het anders? Vul daarna in het <strong>violette</strong> vakje in welk cijfer je zou geven als dat wonder gebeurd is. Er is geen goed of fout. Jij hebt de regie.</p>";
    sectie.appendChild(intro);

    if (geenScanScores) {
      var melding = document.createElement("p");
      melding.className = "melding zichtbaar";
      melding.textContent =
        "Er zijn geen scan-scores gevonden om automatisch in te vullen. Geen probleem, vul de gele vakjes gewoon zelf in.";
      sectie.appendChild(melding);
    }

    var legenda = document.createElement("div");
    legenda.className = "legenda";
    legenda.innerHTML =
      '<span><span class="bolletje geel"></span>Huidig (uit je scan)</span>' +
      '<span><span class="bolletje violet"></span>Gewenst (als het wonder is gebeurd)</span>';
    sectie.appendChild(legenda);

    sectie.appendChild(bouwMindmap(thema));
    sectie.appendChild(bouwKaarten(thema));
    sectie.appendChild(bouwWonderBlok(thema));

    container.appendChild(sectie);
    secties.push(sectie);

    var bolletje = document.createElement("span");
    bolletje.className = "stap-bolletje";
    indicator.appendChild(bolletje);
  });

  [bouwStap2(), bouwStap3(), bouwBonus()].forEach(function (sectie) {
    container.appendChild(sectie);
    secties.push(sectie);
    var bolletje = document.createElement("span");
    bolletje.className = "stap-bolletje";
    indicator.appendChild(bolletje);
  });

  // --- Stap-navigatie (per thema, "opdracht") ---
  var huidigeStap = 0;
  try {
    var opgeslagenStap = parseInt(window.localStorage.getItem(STAP_SLEUTEL) || "0", 10);
    if (opgeslagenStap >= 0 && opgeslagenStap < secties.length) huidigeStap = opgeslagenStap;
  } catch (e) {
    huidigeStap = 0;
  }

  var vorigeBtn = document.getElementById("vorige-btn");
  var volgendeBtn = document.getElementById("volgende-btn");
  var titelEl = document.getElementById("stap-titel");
  var bolletjes = indicator.querySelectorAll(".stap-bolletje");

  function toonStap(index) {
    huidigeStap = index;
    secties.forEach(function (sectie, i) {
      var isActief = i === index;
      sectie.className = "thema" + (isActief ? " actief" : "");
      if (isActief && typeof sectie.ververVasteGevoelsdoelen === "function") {
        sectie.ververVasteGevoelsdoelen();
      }
    });
    bolletjes.forEach(function (bol, i) {
      bol.className = "stap-bolletje" + (i === index ? " actief" : "");
    });
    // "Als alles klopt" is de naam van opdracht 1 (de twee mindmap-stappen),
    // niet van het hele programma.
    titelEl.textContent = index < THEMAS.length ? "Als alles klopt" : "Boost je werkgeluk";
    vorigeBtn.hidden = index === 0;
    volgendeBtn.hidden = index === secties.length - 1;
    volgendeBtn.textContent = index === secties.length - 2 ? "Naar bonus" : "Naar volgende opdracht";
    try {
      window.localStorage.setItem(STAP_SLEUTEL, String(index));
    } catch (e) {
      /* niet fataal */
    }
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  vorigeBtn.addEventListener("click", function () {
    if (huidigeStap > 0) toonStap(huidigeStap - 1);
  });
  volgendeBtn.addEventListener("click", function () {
    if (huidigeStap < secties.length - 1) toonStap(huidigeStap + 1);
  });

  toonStap(huidigeStap);

  document.getElementById("print-btn").addEventListener("click", function () {
    window.print();
  });
})();
</script>
